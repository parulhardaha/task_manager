<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Task Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #ffc0cb 0%, #ffb6d9 50%, #ff69b4 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .navbar h1 {
            color: #ff1493;
            font-size: 28px;
            letter-spacing: 0.5px;
        }

        .logout-btn {
            background: linear-gradient(135deg, #ff1493, #ff69b4);
            color: white;
            padding: 10px 25px;
            border: none;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 20, 147, 0.4);
        }

        .welcome-section {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.2);
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .welcome-section h2 {
            color: #ff1493;
            margin-bottom: 15px;
            font-size: 24px;
        }

        .user-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .user-info p {
            color: #666;
            font-size: 16px;
        }

        .user-info strong {
            color: #d81b60;
            font-weight: 600;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.2);
            text-align: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(255, 105, 180, 0.3);
        }

        .stat-card h3 {
            color: #c2185b;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .stat-number {
            font-size: 42px;
            color: #ff1493;
            font-weight: 700;
        }

        .stat-icon {
            font-size: 30px;
            margin-bottom: 10px;
        }

        .actions-section {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.2);
            backdrop-filter: blur(10px);
        }

        .actions-section h3 {
            color: #ff1493;
            margin-bottom: 20px;
            font-size: 20px;
        }

        .action-button {
            display: inline-block;
            background: linear-gradient(135deg, #ff1493, #ff69b4);
            color: white;
            padding: 12px 30px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            margin-right: 15px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .action-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 20, 147, 0.4);
        }

        .action-button.secondary {
            background: linear-gradient(135deg, #ffb6d9, #ffc0cb);
            color: #d81b60;
        }

        .action-button.secondary:hover {
            box-shadow: 0 10px 25px rgba(255, 182, 217, 0.4);
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .user-info {
                grid-template-columns: 1fr;
            }

            .stats-container {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 15px;
            }

            .stat-number {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>✨ Task Manager</h1>
        <a href="{{ url_for('logout') }}" class="logout-btn">Logout</a>
    </div>

    <div class="welcome-section">
        <h2>👋 Welcome Back, {{ user.name }}!</h2>
        <div class="user-info">
            <p><strong>Email:</strong> {{ user.email }}</p>
            <p><strong>Role:</strong> {{ user.role }}</p>
        </div>
    </div>

    <h3 style="color: white; margin-bottom: 20px; font-size: 24px;">📊 Quick Stats</h3>
    <div class="stats-container">
        <div class="stat-card">
            <div class="stat-icon">📋</div>
            <h3>Total Tasks</h3>
            <div class="stat-number">0</div>
        </div>

        <div class="stat-card">
            <div class="stat-icon">⏳</div>
            <h3>Pending</h3>
            <div class="stat-number">0</div>
        </div>

        <div class="stat-card">
            <div class="stat-icon">✅</div>
            <h3>Completed</h3>
            <div class="stat-number">0</div>
        </div>

        <div class="stat-card">
            <div class="stat-icon">⚠️</div>
            <h3>Overdue</h3>
            <div class="stat-number">0</div>
        </div>
    </div>

    <div class="actions-section">
        <h3>🎯 Quick Actions</h3>
        <a href="#" class="action-button">➕ Create New Task</a>
        <a href="#" class="action-button secondary">📁 View Projects</a>
        <a href="#" class="action-button secondary">👥 Team Members</a>
    </div>
</body>
</html>

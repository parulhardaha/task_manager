<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Task Manager</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #ffc0cb 0%, #ffb6d9 50%, #ff69b4 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .navbar h1 {
            color: #ff1493;
            font-size: 28px;
        }

        .logout-btn {
            background: linear-gradient(135deg, #ff1493, #ff69b4);
            color: white;
            padding: 10px 25px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
        }

        .welcome-section {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .welcome-section h2 {
            color: #ff1493;
            margin-bottom: 10px;
        }

        .user-info p {
            color: #666;
        }

        .user-info strong {
            color: #d81b60;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-card h3 {
            color: #c2185b;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .stat-number {
            font-size: 32px;
            color: #ff1493;
            font-weight: bold;
        }

        .actions-section {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
        }

        .actions-section h3 {
            color: #ff1493;
            margin-bottom: 20px;
        }

        .action-button {
            display: inline-block;
            background: linear-gradient(135deg, #ff1493, #ff69b4);
            color: white;
            padding: 12px 25px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        .action-button.secondary {
            background: #ffe4ec;
            color: #d81b60;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <h1>Task Manager</h1>
        <a href="{{ url_for('routes.logout') }}" class="logout-btn">Logout</a>
    </div>

    <div class="welcome-section">
        <h2>Welcome Back, {{ user.name }}!</h2>
        <div class="user-info">
            <p><strong>Email:</strong> {{ user.email }}</p>
            <p><strong>Role:</strong> {{ user.role }}</p>
        </div>
    </div>

    <h3 style="color: white; margin-bottom: 15px;">Quick Stats</h3>

    <div class="stats-container">
        <div class="stat-card">
            <h3>Total Tasks</h3>
            <div class="stat-number">0</div>
        </div>

        <div class="stat-card">
            <h3>Pending</h3>
            <div class="stat-number">0</div>
        </div>

        <div class="stat-card">
            <h3>Completed</h3>
            <div class="stat-number">0</div>
        </div>
    </div>

    <div class="actions-section">
        <h3>Quick Actions</h3>

        <!-- View Projects -->
        <a href="{{ url_for('routes.projects') }}" class="action-button secondary">
            📁 View Projects
        </a>

        <!-- Only Admin sees this -->
        {% if user.role == "Admin" %}
        <a href="{{ url_for('routes.create_project') }}" class="action-button">
            ➕ Create New Project
        </a>
        {% endif %}

    </div>

</body>
</html>
